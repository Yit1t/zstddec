name: Build and Test

"on":
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    build-and-test:
        runs-on: ubuntu-24.04

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Install dependencies
              run: |
                sudo apt-get update
                sudo apt-get install -y \
                    meson ninja-build gcc pkg-config \
                    libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev libzstd-dev \
                    gstreamer1.0-tools zstd
            - name: Build
              run: |
                meson setup build
                meson compile -C build

            - name: Inspect plugin
              run: |
                GST_PLUGIN_PATH=./build gst-inspect-1.0 zstddec

            - name: Test file
              run: |
                echo "hello world" > test.txt
                zstd test.txt -o test.txt.zst
                GST_PLUGIN_PATH=./build gst-launch-1.0 \
                    filesrc location=test.txt.zst ! zstddec ! filesink location=output.txt
                diff test.txt output.txt

                  

